version: 2
build:
  os: ubuntu-24.04
  jobs:
    post_checkout:
      # unshallow so the version works
      - git fetch --unshallow
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    create_environment:
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    pre_install:
      # see https://github.com/readthedocs/readthedocs.org/issues/8201
      - git update-index --assume-unchanged docs/source/conf.py
    install:
      # TODO: enable --frozen if defining a uv.lock file
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --group docs
  tools:
    python: "3.14"
sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true
